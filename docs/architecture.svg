<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1240 930" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#475569"/>
    </marker>
    <marker id="arrowGreen" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#059669"/>
    </marker>
    <marker id="arrowViolet" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1240" height="930" rx="14" fill="#f8fafc"/>

  <!-- Title -->
  <text x="620" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#0f172a">AgentMarket — Proof-of-Quality Architecture</text>
  <text x="620" y="72" text-anchor="middle" font-size="14" fill="#64748b">The model proposes · the policy-bound signer decides · reputation is earned on-chain</text>

  <!-- ================= UNTRUSTED ZONE ================= -->
  <rect x="90" y="92" width="1060" height="208" rx="12" fill="#fef2f2" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="108" y="116" font-size="12.5" font-weight="700" fill="#b91c1c" letter-spacing="0.5">① REASONING — UNTRUSTED · HOLDS NO KEY</text>

  <!-- AI model card -->
  <g filter="url(#shadow)">
    <rect x="345" y="124" width="550" height="74" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="345" y="124" width="6" height="74" rx="3" fill="#6366f1"/>
  </g>
  <text x="620" y="154" text-anchor="middle" font-size="17" font-weight="700" fill="#0f172a">AI Model · Nebius DeepSeek-V3.2 / Claude</text>
  <text x="620" y="177" text-anchor="middle" font-size="12.5" fill="#64748b">reasons over tools · <tspan font-weight="700" fill="#b91c1c">PROPOSES</tspan> transactions · never holds a private key</text>

  <!-- arrow AI -> policy -->
  <line x1="620" y1="198" x2="620" y2="226" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="632" y="218" font-size="11.5" fill="#475569">proposes intent</text>

  <!-- SpendPolicy card -->
  <g filter="url(#shadow)">
    <rect x="345" y="228" width="550" height="60" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="345" y="228" width="6" height="60" rx="3" fill="#f59e0b"/>
  </g>
  <text x="620" y="253" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">SpendPolicy · advisory pre-check (app layer)</text>
  <text x="620" y="273" text-anchor="middle" font-size="12" fill="#64748b">budget cap · payee allowlist · reputation gate — fast feedback, but not trusted</text>

  <!-- ================= TRUST BOUNDARY ================= -->
  <line x1="80" y1="324" x2="1160" y2="324" stroke="#dc2626" stroke-width="2" stroke-dasharray="9 6"/>
  <rect x="430" y="311" width="380" height="26" rx="13" fill="#fee2e2" stroke="#dc2626" stroke-width="1.2"/>
  <text x="620" y="328" text-anchor="middle" font-size="12.5" font-weight="700" fill="#b91c1c">🔒 TRUST BOUNDARY — a prompt-injected model cannot cross</text>

  <!-- ================= TRUSTED ZONE ================= -->
  <rect x="90" y="346" width="1060" height="476" rx="12" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="108" y="370" font-size="12.5" font-weight="700" fill="#0f766e" letter-spacing="0.5">② EXECUTION — AUTHORITATIVE · KEY IN CIRCLE MPC</text>

  <!-- Circle wallet hero card -->
  <g filter="url(#shadow)">
    <rect x="320" y="382" width="600" height="92" rx="12" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  </g>
  <text x="620" y="412" text-anchor="middle" font-size="18" font-weight="700" fill="#1e3a8a">🔑 Circle Agent Wallet · MPC signer (authoritative)</text>
  <text x="620" y="435" text-anchor="middle" font-size="12.5" fill="#1e40af">signs ONLY what passes the wallet's on-chain spending policy</text>
  <text x="620" y="455" text-anchor="middle" font-size="12.5" fill="#1e40af">allowlist + per-tx / daily caps · set by the human via OTP · the agent can't change it</text>

  <!-- split arrows to channels -->
  <path d="M560 474 C 470 492, 420 490, 372 502" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <path d="M680 474 C 770 492, 820 490, 868 502" fill="none" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- left channel: x402 -->
  <g filter="url(#shadow)">
    <rect x="200" y="504" width="324" height="58" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="200" y="504" width="6" height="58" rx="3" fill="#0ea5e9"/>
  </g>
  <text x="362" y="529" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0f172a">x402 Nanopayment</text>
  <text x="362" y="548" text-anchor="middle" font-size="11.5" fill="#64748b">circle services pay · gasless USDC (Base)</text>

  <!-- right channel: wallet execute -->
  <g filter="url(#shadow)">
    <rect x="716" y="504" width="324" height="58" rx="10" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="716" y="504" width="6" height="58" rx="3" fill="#7c3aed"/>
  </g>
  <text x="878" y="529" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0f172a">wallet execute</text>
  <text x="878" y="548" text-anchor="middle" font-size="11.5" fill="#64748b">MPC signs ERC-8004 calldata</text>

  <!-- arrows channel -> external -->
  <line x1="362" y1="562" x2="362" y2="604" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>
  <line x1="878" y1="562" x2="878" y2="604" stroke="#475569" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- left external: StableEnrich -->
  <g filter="url(#shadow)">
    <rect x="170" y="606" width="384" height="150" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="170" y="606" width="6" height="150" rx="3" fill="#0ea5e9"/>
  </g>
  <text x="362" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">StableEnrich · real paid services</text>
  <text x="362" y="657" text-anchor="middle" font-size="12" fill="#334155">Apollo People Search / Enrich</text>
  <text x="362" y="678" text-anchor="middle" font-size="12" fill="#334155">Minerva Enrich · Clado Enrich  <tspan fill="#94a3b8">(competing)</tspan></text>
  <text x="362" y="699" text-anchor="middle" font-size="12" fill="#334155">Hunter — <tspan font-weight="700">independent</tspan> email verify</text>
  <rect x="232" y="714" width="260" height="26" rx="13" fill="#f0f9ff" stroke="#bae6fd"/>
  <text x="362" y="731" text-anchor="middle" font-size="11" fill="#0369a1">real marketplace data · USDC-priced per call</text>

  <!-- right external: ERC-8004 -->
  <g filter="url(#shadow)">
    <rect x="686" y="606" width="384" height="150" rx="11" fill="#ffffff" stroke="#e2e8f0"/>
    <rect x="686" y="606" width="6" height="150" rx="3" fill="#7c3aed"/>
  </g>
  <text x="878" y="632" text-anchor="middle" font-size="15" font-weight="700" fill="#0f172a">ERC-8004 registries · Base</text>
  <text x="878" y="657" text-anchor="middle" font-size="12" fill="#334155"><tspan font-weight="700">IdentityRegistry</tspan> — ERC-721 agent identity</text>
  <text x="878" y="678" text-anchor="middle" font-size="12" fill="#334155"><tspan font-weight="700">ReputationRegistry</tspan> — payment-anchored</text>
  <text x="878" y="699" text-anchor="middle" font-size="11" fill="#94a3b8" font-family="ui-monospace, monospace">0x8004A818…  /  0x8004B663…</text>
  <rect x="748" y="714" width="260" height="26" rx="13" fill="#f5f3ff" stroke="#ddd6fe"/>
  <text x="878" y="731" text-anchor="middle" font-size="11" fill="#6d28d9">reputation = ownable, transferable asset</text>

  <!-- cross-verify + attest arrow (StableEnrich -> ERC-8004) -->
  <line x1="554" y1="668" x2="686" y2="668" stroke="#7c3aed" stroke-width="1.8" marker-end="url(#arrowViolet)"/>
  <text x="620" y="654" text-anchor="middle" font-size="10.5" font-weight="700" fill="#6d28d9">attest</text>
  <text x="620" y="690" text-anchor="middle" font-size="9.5" fill="#7c3aed">pay+verify+outcome</text>

  <!-- reputation feedback loop: keyless public read back to the policy gate -->
  <path d="M1070 648 H 1118 V 256 H 897" fill="none" stroke="#059669" stroke-width="1.8" stroke-dasharray="7 4" marker-end="url(#arrowGreen)"/>
  <text x="1128" y="450" font-size="11.5" font-weight="700" fill="#047857" transform="rotate(90 1128 450)">query reputation BEFORE paying · keyless public read</text>

  <!-- ================= NETWORK EFFECT ================= -->
  <g filter="url(#shadow)">
    <rect x="90" y="840" width="1060" height="74" rx="12" fill="#ecfdf5" stroke="#6ee7b7" stroke-width="1.5"/>
  </g>
  <text x="116" y="868" font-size="14" font-weight="700" fill="#065f46">⚡ NETWORK EFFECT</text>
  <text x="116" y="890" font-size="12.5" fill="#047857">Agent A pays + cross-verifies + attests on-chain  →  Agent B reads the reputation, pays <tspan font-weight="700">$0</tspan> to learn, and routes around the proven-bad service it never touched.</text>
  <text x="116" y="908" font-size="12.5" font-style="italic" fill="#059669">One agent's paid lesson becomes a public good — that is the infrastructure.</text>
</svg>
